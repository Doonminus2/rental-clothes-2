<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental Clothes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />

  <link rel="stylesheet" href="template/main.css" />
</head>
<body>

<div class="Main">

  <header class="SiteHeader">

    <div class="TopBar">
      <div class="TopBar-icons">
        <a href="faq.html" class="Icon-faq-link Icon-faq-link--active" title="คำถามที่พบบ่อย">
          <img class="Icon-faq" src="images/faq.png" alt="FAQ icon" />
        </a>
      </div>
      <a href="login.html" class="BtnLogin">
        <span class="BtnLogin-text">LOGIN</span>
      </a>
    </div>

    <div class="HeroArea">
      <div class="HeroText">
        <div class="HeroR-top">R </div>
        <div class="HeroC-top">C</div>
        <div class="HeroSubtitle-top">RENTAL CLOTHES</div>
      </div>
      <img class="HeroImage" src="images/logo.png" alt="hero fashion" />
    </div>

    <nav class="Navbar">
      <a href="main.html"   class="NavBtn NavBtn--active">HOME</a>
      <a href="rental.html"  class="NavBtn">RENTAL PRODUCTS</a>

    <div class="Carousel">
      <div class="Carousel-track">

        <div class="Carousel-slide"><img src="images/main1.jpg" alt="slide 2" /></div>
        <div class="Carousel-slide"><img src="images/main2.jpg" alt="slide 3" /></div>
        <div class="Carousel-slide"><img src="images/main3.jpg" alt="slide 4" /></div>
      </div>
    </div>

    <div class="HeroSubtitle-bottom">
      <div class="rc-logo">RC</div>
      <div class="rc-text">RENTAL CLOTHES</div>
    </div>

    <button class="ArrowPrev" aria-label="Previous slide">&#8249;</button>
    <button class="ArrowNext" aria-label="Next slide">&#8250;</button>

    <div class="Carousel-dots">
      <span class="Carousel-dot active"></span>
      <span class="Carousel-dot"></span>
      <span class="Carousel-dot"></span>
    </div>

<script src="Carousel.js"></script>
<script src="user.js"></script>
