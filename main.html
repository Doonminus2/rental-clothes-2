<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental Clothes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@700;900&family=Headland+One&family=Hedvig+Letters+Serif&family=Radley&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="template/main.css" />
</head>
<body>

<div class="Main">

  <header class="SiteHeader">

    <div class="TopBar">
      <div class="TopBar-icons">
        <a href="faq.html" class="Icon-faq-link Icon-faq-link--active" title="คำถามที่พบบ่อย">
          <img class="Icon-faq" src="images/faq.png" alt="FAQ icon" />
        </a>
      </div>
      <a href="login.html" class="BtnLogin">
        <span class="BtnLogin-text">LOGIN</span>
      </a>
    </div>

    <div class="HeroArea">
      <div class="HeroText">
        <div class="HeroR-top">R </div>
        <div class="HeroC-top">C</div>
        <div class="HeroSubtitle-top">RENTAL CLOTHES</div>
      </div>
      <img class="HeroImage" src="images/logo.png" alt="hero fashion" />
    </div>

    <nav class="Navbar">
      <a href="main.html"   class="NavBtn NavBtn--active">HOME</a>
      <a href="rental.html"  class="NavBtn">RENTAL PRODUCTS</a>
      <a href="howtorent.html"          class="NavBtn">HOW TO RENT</a>
      <a href="review.html"            class="NavBtn">REVIEW</a>
      <a href="article.html"            class="NavBtn">ARTICLE</a>
      <a href="contact.html"            class="NavBtn">CONTACT</a>
      <a href="gallery.html"           class="NavBtn">GALLERY</a>
    </nav>

  </header>

  <section class="BodySection">

    <div class="Carousel">
      <div class="Carousel-track">
         <div class="Carousel-slide"><img src="images/main4.jpg" alt="slide 1" /></div>
        <div class="Carousel-slide"><img src="images/main1.jpg" alt="slide 2" /></div>
        <div class="Carousel-slide"><img src="images/main2.jpg" alt="slide 3" /></div>
        <div class="Carousel-slide"><img src="images/main3.jpg" alt="slide 4" /></div>
      </div>
    </div>

    <div class="HeroSubtitle-bottom">
      <div class="rc-logo">RC</div>
      <div class="rc-text">RENTAL CLOTHES</div>
    </div>

    <button class="ArrowPrev" aria-label="Previous slide">&#8249;</button>
    <button class="ArrowNext" aria-label="Next slide">&#8250;</button>

    <div class="Carousel-dots">
      <span class="Carousel-dot active"></span>
      <span class="Carousel-dot"></span>
      <span class="Carousel-dot"></span>
    </div>

  </section>

</div>

<script>
// 🛡️ ระบบจัดการสถานะล็อกอินบน Nav Bar
function updateAuthStatus() {
    const authBtn = document.querySelector('.BtnLogin');
    const authText = document.querySelector('.BtnLogin-text');
    const loginLink = authBtn ? authBtn.closest('a') : null;

    const isLoggedIn = localStorage.getItem('isLoggedIn');
    const userName = localStorage.getItem('userName');

    if (isLoggedIn === 'true' && userName) {
        // ✅ ถ้าล็อกอินแล้ว: แสดงชื่อ และลิงก์ไปหน้า My Account
        if (authText) authText.textContent = userName;
        if (loginLink) {
            loginLink.href = "data.html";
            loginLink.title = "จัดการข้อมูลส่วนตัว";
        }
        if (authBtn) {
            authBtn.style.backgroundColor = "#1a7a48"; // สีเขียวเข้มบอกสถานะ
            authBtn.style.borderColor = "#1a7a48";
        }
    } else {
        // ❌ ถ้ายังไม่ล็อกอิน: แสดงคำว่า LOGIN
        if (authText) authText.textContent = "LOGIN";
        if (loginLink) {
            loginLink.href = "login.html";
            loginLink.title = "เข้าสู่ระบบ";
        }
        if (authBtn) {
            authBtn.style.backgroundColor = ""; 
            authBtn.style.borderColor = "";
        }
    }
}

// เช็คสถานะตอนโหลดหน้าครั้งแรก
document.addEventListener("DOMContentLoaded", updateAuthStatus);

// ✨ หัวใจสำคัญ: เช็คสถานะทุกครั้งที่หน้าโผล่ (รวมถึงตอนกด Back)
window.onpageshow = function(event) {
    updateAuthStatus();
};
</script>
<script src="carousel.js"></script>
</body>
</html>
