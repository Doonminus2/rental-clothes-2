<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rental Clothes – Login</title>
  
  <script>
    // 🛡️ บรรทัดแรกสุด: เช็คทุกครั้งที่หน้าโผล่ (รวมถึงตอนกด Back)
    window.onpageshow = function(event) {
        if (localStorage.getItem('isLoggedIn') === 'true' || localStorage.getItem('token')) {
            window.location.replace('main.html');
        }
    };
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700;900&family=Headland+One&family=Hedvig+Letters+Serif&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="template/rental.css" />
  <link rel="stylesheet" href="template/login.css" />
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .swal2-popup { font-family: 'Hanuman', serif !important; }
  </style>
</head>
<body>
<div class="Page">

  <header class="SiteHeader">
    <div class="SiteHeader-top">
      <a href="main.html" class="SiteHeader-logo">
        <img class="Logo-img" src="images/logo.png" alt="Rental Clothes logo" />
        <span class="Logo-text">RENTAL CLOTHES</span>
      </a>
      <div class="SiteHeader-actions">
        <a href="faq.html" class="Icon-faq-link" title="คำถามที่พบบ่อย">
          <img class="Icon-faq" src="images/faq.png" alt="FAQ icon" />
        </a>
        <a href="login.html" class="BtnLogin BtnLogin--active">
          <span class="BtnLogin-text BtnLogin-text--active">LOGIN</span>
        </a>
      </div>
    </div>
    <nav class="Navbar">
      <a href="main.html"      class="NavBtn">HOME</a>
      <a href="rental.html"    class="NavBtn">RENTAL PRODUCTS</a>
      <a href="howtorent.html" class="NavBtn">HOW TO RENT</a>
      <a href="review.html"    class="NavBtn">REVIEW</a>
      <a href="article.html"   class="NavBtn">ARTICLE</a>
      <a href="contact.html"   class="NavBtn">CONTACT</a>
      <a href="gallery.html"   class="NavBtn">GALLERY</a>
    </nav>
  </header>

  <main class="LoginPage">
    <h1 class="LoginPage-title">RENTAL CLOTHES</h1>
    <div class="LoginCard">
      <div class="LoginCard-left">
        <img class="LoginCard-logo" src="images/logo.png" alt="Rental Clothes logo" />
        <div class="LoginCard-rc">
          <span class="LoginCard-letter">R</span>
          <span class="LoginCard-letter LoginCard-letter--c">C</span>
        </div>
        <p class="LoginCard-brand">RENTAL CLOTHES</p>
      </div>

      <div class="LoginCard-right">
        <h2 class="LoginForm-title">Login</h2>
        <form class="LoginForm" action="#" method="post">
          <div class="LoginForm-group">
            <label class="LoginForm-label" for="username">
              Username or Email <span class="LoginForm-required">*</span>
            </label>
            <input class="LoginForm-input" type="text" id="username" name="username" placeholder="Username or Email..." required />
          </div>

          <div class="LoginForm-group">
            <label class="LoginForm-label" for="password">
              Password <span class="LoginForm-required">*</span>
            </label>
            <input class="LoginForm-input" type="password" id="password" name="password" placeholder="Password..." required />
          </div>

          <p class="LoginForm-signup">
            Don't have an account? <a href="register.html" class="LoginForm-signup-link">Sign Up</a>
          </p>

          <button class="LoginForm-submit" type="submit">LOGIN</button>

          <p class="LoginForm-terms">
            การดำเนินการต่อแสดงว่าคุณยอมรับข้อตกลงการใช้บริการ 
            <a href="policy.html" class="LoginForm-terms-link">นโยบายส่วนตัวของเรา</a>
          </p>
        </form>
      </div>
    </div>
  </main>
</div>

<script>
  document.querySelector('.LoginForm').addEventListener('submit', async function(event) {
    event.preventDefault(); 

    const form = event.target;
    const formData = new FormData(form);

    try {
      Swal.fire({
        title: 'กำลังตรวจสอบข้อมูล...',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading() }
      });

      const response = await fetch('/login.html', {
        method: 'POST',
        body: formData 
      });

      const data = await response.json();

      if (data.success) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('isLoggedIn', 'true');
        if(data.user) {
           localStorage.setItem('user', JSON.stringify(data.user));
           localStorage.setItem('userName', data.user.username);
        }

        Swal.fire({
          icon: 'success',
          title: 'เข้าสู่ระบบสำเร็จ!',
          text: `ยินดีต้อนรับคุณ ${data.user ? data.user.username : ''}`,
          timer: 1500,
          showConfirmButton: false
        }).then(() => {
          // ใช้ replace เพื่อล้าง History
          window.location.replace('main.html'); 
        });

      } else {
        Swal.fire({
          icon: 'error',
          title: 'เข้าสู่ระบบไม่สำเร็จ',
          text: data.message,
          confirmButtonColor: '#114e72'
        });
      }
    } catch (error) {
      console.error('Error:', error);
      Swal.fire({
        icon: 'warning',
        title: 'เกิดข้อผิดพลาด',
        text: 'ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้',
      });
    }
  });
</script>
</body>
</html>
